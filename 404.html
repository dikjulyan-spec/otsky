      --text: #151515;
      --muted: #68625b;
      --line: rgba(21, 21, 21, 0.12);
      --dark: #111111;
      --dark-2: #202020;
      --accent: #d7a354;
      --accent-2: #8d6236;
      --radius-lg: 28px;
      --radius-md: 18px;
      --radius-sm: 12px;
      --shadow: 0 24px 70px rgba(17, 17, 17, 0.12);
      --shadow-soft: 0 14px 40px rgba(17, 17, 17, 0.08);
      --container: 1180px;

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.55;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    button, input, textarea, select { font: inherit; }
    .skip-link {
      position: absolute; left: 16px; top: -60px; z-index: 1000;
      background: var(--dark); color: #fff; padding: 10px 14px;
      border-radius: 999px; transition: top 0.2s ease;
    }
    .skip-link:focus { top: 16px; }
    .container { width: min(var(--container), calc(100% - 40px)); margin: 0 auto; }
    .loading { min-height: 100vh; display: grid; place-items: center; color: var(--muted); font-weight: 800; }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px;
      border: 1px solid var(--line); border-radius: 999px; background: rgba(255,255,255,.72);
      color: var(--muted); font-size: 13px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase;
    }
    .eyebrow::before {
      content: ""; width: 7px; height: 7px; border-radius: 999px; background: var(--accent);
      box-shadow: 0 0 0 5px rgba(215,163,84,.15);
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 9px; min-height: 48px;
      padding: 13px 18px; border-radius: 999px; border: 1px solid transparent; cursor: pointer;
      font-weight: 850; transition: transform .18s ease, box-shadow .18s ease, background .18s ease, color .18s ease;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary { color: #fff; background: var(--dark); box-shadow: 0 14px 28px rgba(17,17,17,.22); }
    .btn-primary:hover { background: #000; }
    .btn-secondary { color: var(--text); background: rgba(255,255,255,.78); border-color: var(--line); }
    .btn-secondary:hover { background: #fff; box-shadow: var(--shadow-soft); }
    .btn-light { color: var(--dark); background: #fff; }
    .btn-outline-dark { color: #fff; border-color: rgba(255,255,255,.24); background: rgba(255,255,255,.08); }
    .btn-outline-dark:hover { background: rgba(255,255,255,.16); }
    .section { padding: 86px 0; }
    .section-heading {
      display: grid; grid-template-columns: 1fr minmax(260px, 410px); gap: 28px; align-items: end; margin-bottom: 34px;
    }
    .section-heading h2 { margin: 14px 0 0; font-size: clamp(32px, 4vw, 54px); line-height: .98; letter-spacing: -.055em; }
    .section-heading p { margin: 0; color: var(--muted); font-size: 16px; }

    .site-header {
      position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(17,17,17,.08);
      background: rgba(247,244,238,.88); backdrop-filter: blur(18px);
    }
    .nav { display: flex; align-items: center; justify-content: space-between; min-height: 76px; gap: 24px; }
    .brand { display: inline-flex; align-items: center; gap: 12px; font-weight: 950; letter-spacing: -.055em; font-size: 24px; }
    .brand-mark {
      display: grid; place-items: center; width: 42px; height: 42px; border-radius: 14px; color: #fff;
      background: radial-gradient(circle at 30% 20%, #4d4d4d, #111 58%, #000); box-shadow: 0 10px 25px rgba(17,17,17,.18);
      font-size: 14px; letter-spacing: -.03em;
    }
    .brand small { display: block; margin-top: -4px; color: var(--muted); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; font-weight: 850; }
    .nav-links { display: flex; align-items: center; gap: 8px; color: var(--muted); font-weight: 800; font-size: 14px; }
    .nav-links a { padding: 10px 12px; border-radius: 999px; }
    .nav-links a:hover { color: var(--text); background: rgba(255,255,255,.7); }
    .menu-toggle { display: none; width: 44px; height: 44px; border: 1px solid var(--line); border-radius: 999px; background: #fff; }
    .menu-toggle span { display: block; width: 18px; height: 2px; margin: 4px auto; background: var(--dark); border-radius: 99px; }

    .announcement { background: var(--dark); color: rgba(255,255,255,.84); font-size: 13px; font-weight: 750; }
    .announcement .container { min-height: 38px; display: flex; align-items: center; justify-content: center; text-align: center; }

    .hero { position: relative; overflow: hidden; padding: 64px 0 38px; }
    .hero::before {
      content: ""; position: absolute; inset: -180px -120px auto auto; width: 460px; height: 460px; border-radius: 999px;
      background: radial-gradient(circle, rgba(215,163,84,.34), rgba(215,163,84,0) 68%); pointer-events: none;
    }
    .hero-grid { display: grid; grid-template-columns: minmax(0, 1.02fr) minmax(340px, .78fr); gap: 44px; align-items: center; }
    .hero h1 { margin: 18px 0 16px; font-size: clamp(46px, 7vw, 88px); line-height: .91; letter-spacing: -.075em; max-width: 880px; }
    .hero p { margin: 0; max-width: 650px; color: var(--muted); font-size: clamp(17px, 1.6vw, 20px); }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 28px; }
    .hero-badges { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 30px; }
    .pill { display: inline-flex; padding: 9px 12px; border-radius: 999px; border: 1px solid var(--line); background: rgba(255,255,255,.72); color: var(--muted); font-weight: 800; font-size: 13px; }
    .hero-visual { position: relative; }
    .hero-card {
      position: relative; overflow: hidden; min-height: 530px; border-radius: var(--radius-lg); background: linear-gradient(145deg, #1d1d1d, #0b0b0b);
      box-shadow: var(--shadow); color: #fff; isolation: isolate;
    }
    .hero-card img { width: 100%; height: 100%; min-height: 530px; object-fit: cover; opacity: .9; }
    .hero-card .placeholder { position: absolute; inset: 0; display: grid; place-items: center; padding: 32px; text-align: center; }
    .hero-card .placeholder::before {
      content: ""; position: absolute; inset: 24px; border: 1px solid rgba(255,255,255,.12); border-radius: 22px;
      background: radial-gradient(circle at 20% 10%, rgba(215,163,84,.35), transparent 28%), radial-gradient(circle at 90% 80%, rgba(255,255,255,.12), transparent 24%);
    }
    .hero-card .placeholder span { position: relative; font-size: clamp(56px, 8vw, 96px); font-weight: 950; letter-spacing: -.09em; }
    .floating-note {
      position: absolute; left: -24px; bottom: 30px; max-width: 260px; padding: 18px; border-radius: 22px; background: rgba(255,255,255,.92);
      box-shadow: var(--shadow-soft); border: 1px solid rgba(255,255,255,.75);
    }
    .floating-note strong { display: block; font-size: 18px; line-height: 1.1; letter-spacing: -.035em; }
    .floating-note span { display: block; margin-top: 6px; color: var(--muted); font-size: 13px; font-weight: 700; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 38px; }
    .stat-card { padding: 20px; border: 1px solid var(--line); border-radius: 22px; background: rgba(255,255,255,.68); }
    .stat-card strong { display: block; font-size: clamp(28px, 3.8vw, 44px); line-height: 1; letter-spacing: -.055em; }
    .stat-card span { display: block; margin-top: 8px; color: var(--muted); font-weight: 800; font-size: 13px; }

    .trust-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .trust-card, .category-card, .product-card, .promo-card, .channel-card, .look-card {
      border: 1px solid var(--line); background: rgba(255,255,255,.76); border-radius: var(--radius-md); box-shadow: var(--shadow-soft);
    }
    .trust-card { padding: 22px; box-shadow: none; }
    .trust-card strong { display: block; font-size: 17px; line-height: 1.18; letter-spacing: -.025em; }
    .trust-card p { margin: 8px 0 0; color: var(--muted); font-size: 14px; }

    .category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .category-card { overflow: hidden; min-height: 226px; display: grid; grid-template-columns: 1fr 120px; align-items: stretch; }
    .category-copy { padding: 24px; display: flex; flex-direction: column; justify-content: space-between; gap: 20px; }
    .category-card h3, .product-card h3, .promo-card h3, .look-card h3 { margin: 0; font-size: 22px; line-height: 1.05; letter-spacing: -.04em; }
    .category-card p, .product-card p, .promo-card p, .look-card p { margin: 10px 0 0; color: var(--muted); font-size: 14px; }
    .category-art { min-height: 100%; background: linear-gradient(150deg, rgba(17,17,17,.08), rgba(215,163,84,.32)); display: grid; place-items: center; overflow: hidden; }
    .category-art img { width: 100%; height: 100%; object-fit: cover; }
    .category-art span { font-size: 42px; font-weight: 950; letter-spacing: -.08em; color: rgba(17,17,17,.38); }
    .text-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text); font-weight: 900; font-size: 14px; }

    .product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
    .product-card { overflow: hidden; display: flex; flex-direction: column; }
    .product-media { aspect-ratio: 4 / 4.35; background: linear-gradient(145deg, #efeadf, #d6c6a8); display: grid; place-items: center; overflow: hidden; }
    .product-media img { width: 100%; height: 100%; object-fit: cover; }
    .product-media span { font-size: 34px; font-weight: 950; color: rgba(17,17,17,.34); letter-spacing: -.08em; text-align: center; padding: 20px; }
    .product-copy { padding: 18px; flex: 1; display: flex; flex-direction: column; }
    .badge { display: inline-flex; align-self: flex-start; padding: 6px 9px; border-radius: 999px; background: rgba(215,163,84,.18); color: var(--accent-2); font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    .product-copy h3 { margin-top: 12px; }
    .product-meta { margin-top: auto; padding-top: 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .price { font-size: 18px; font-weight: 950; letter-spacing: -.03em; }
    .mini-category { color: var(--muted); font-size: 12px; font-weight: 850; text-transform: uppercase; letter-spacing: .05em; }

    .promo-section { background: var(--dark); color: #fff; position: relative; overflow: hidden; }
    .promo-section::before { content: ""; position: absolute; width: 540px; height: 540px; right: -160px; top: -180px; border-radius: 999px; background: radial-gradient(circle, rgba(215,163,84,.28), transparent 67%); }
    .promo-section .eyebrow { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.14); color: rgba(255,255,255,.76); }
    .promo-section .section-heading p { color: rgba(255,255,255,.66); }
    .promo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; position: relative; }
    .promo-card { padding: 28px; background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.13); box-shadow: none; }
    .promo-card p { color: rgba(255,255,255,.68); }
    .promo-label { display: inline-flex; padding: 7px 10px; border-radius: 999px; background: rgba(215,163,84,.18); color: #ffdca4; font-weight: 900; font-size: 12px; letter-spacing: .05em; text-transform: uppercase; margin-bottom: 16px; }

    .story-grid { display: grid; grid-template-columns: .85fr 1.15fr; gap: 34px; align-items: center; }
    .story-media { min-height: 480px; border-radius: var(--radius-lg); overflow: hidden; background: linear-gradient(145deg, #e9dfcc, #c5ad82); box-shadow: var(--shadow-soft); display: grid; place-items: center; }
    .story-media img { width: 100%; height: 100%; min-height: 480px; object-fit: cover; }
    .story-media span { font-size: clamp(44px, 7vw, 80px); font-weight: 950; color: rgba(17,17,17,.32); letter-spacing: -.08em; }
    .story-copy h2 { margin: 16px 0 18px; font-size: clamp(34px, 4.8vw, 60px); line-height: .96; letter-spacing: -.06em; }
    .story-copy p { color: var(--muted); font-size: 17px; margin: 0 0 14px; }
    .highlight-list { display: grid; gap: 10px; margin: 24px 0 0; padding: 0; list-style: none; }
    .highlight-list li { display: flex; gap: 10px; align-items: flex-start; padding: 12px 14px; border-radius: 16px; background: rgba(255,255,255,.72); border: 1px solid var(--line); font-weight: 800; }
    .highlight-list li::before { content: "✓"; color: var(--accent-2); font-weight: 950; }

    .look-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .look-card { overflow: hidden; }
    .look-media { aspect-ratio: 1 / 1.1; background: linear-gradient(145deg, #efe7d8, #d3bf99); display: grid; place-items: center; }
    .look-media img { width: 100%; height: 100%; object-fit: cover; }
    .look-media span { font-size: 34px; font-weight: 950; color: rgba(17,17,17,.28); letter-spacing: -.07em; text-align: center; padding: 20px; }
    .look-copy { padding: 20px; }

    .channels { background: var(--bg-soft); }
    .channel-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .channel-card { padding: 20px; box-shadow: none; transition: transform .18s ease, box-shadow .18s ease; }
    .channel-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-soft); }
    .channel-card strong { display: block; font-size: 18px; letter-spacing: -.03em; }
    .channel-card span { display: block; margin-top: 8px; color: var(--muted); font-size: 13px; font-weight: 700; }

    .faq-grid { display: grid; grid-template-columns: .75fr 1.25fr; gap: 36px; }
    .faq-list { display: grid; gap: 12px; }
    details { border: 1px solid var(--line); border-radius: 18px; background: rgba(255,255,255,.72); overflow: hidden; }
    summary { cursor: pointer; padding: 18px 20px; font-weight: 900; letter-spacing: -.025em; }
    details p { margin: 0; padding: 0 20px 20px; color: var(--muted); }

    .site-footer { padding: 52px 0 92px; background: #0f0f0f; color: rgba(255,255,255,.72); }
    .footer-grid { display: grid; grid-template-columns: 1fr auto; gap: 28px; align-items: start; }
    .site-footer .brand { color: #fff; }
    .site-footer p { max-width: 520px; margin: 16px 0 0; }
    .footer-links { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 10px; }
    .footer-links a { padding: 9px 12px; border: 1px solid rgba(255,255,255,.14); border-radius: 999px; font-weight: 800; font-size: 13px; }
    .copyright { margin-top: 34px; padding-top: 22px; border-top: 1px solid rgba(255,255,255,.12); font-size: 13px; }
    .sticky-cs {
      position: fixed; right: 18px; bottom: 18px; z-index: 90; background: #111; color: #fff; border-radius: 999px;
      padding: 13px 16px; box-shadow: 0 18px 38px rgba(17,17,17,.28); font-weight: 900; display: inline-flex; align-items: center; gap: 8px;
    }

    @media (max-width: 980px) {
      .section { padding: 66px 0; }
      .hero-grid, .story-grid, .faq-grid, .section-heading { grid-template-columns: 1fr; }
      .hero-card, .hero-card img { min-height: 420px; }
      .trust-grid, .product-grid, .channel-grid { grid-template-columns: repeat(2, 1fr); }
      .category-grid, .promo-grid, .look-grid { grid-template-columns: 1fr; }
      .floating-note { left: 16px; right: 16px; bottom: 16px; max-width: none; }
    }
    @media (max-width: 720px) {
      .container { width: min(var(--container), calc(100% - 28px)); }
      .menu-toggle { display: inline-block; }
      .nav-links {
        position: absolute; left: 14px; right: 14px; top: 70px; display: none; flex-direction: column; align-items: stretch;
        padding: 10px; border: 1px solid var(--line); background: rgba(255,255,255,.96); border-radius: 22px; box-shadow: var(--shadow-soft);
      }
      .nav-links.is-open { display: flex; }
      .nav-links a { padding: 12px 14px; }
      .hero { padding-top: 42px; }
      .stats, .trust-grid, .product-grid, .channel-grid { grid-template-columns: 1fr; }
      .category-card { grid-template-columns: 1fr; }
      .category-art { min-height: 120px; }
      .hero-actions { align-items: stretch; flex-direction: column; }
      .btn { width: 100%; }
      .footer-grid { grid-template-columns: 1fr; }
      .footer-links { justify-content: flex-start; }
      .sticky-cs { left: 14px; right: 14px; justify-content: center; }
    }
  </style>
</head>

  <script src="config.js"></script>
  <script>
    (() => {
      const DEFAULT_CONTENT = JSON.parse(document.getElementById('default-content').textContent);
      const app = document.getElementById('app');
      const esc = (value) => String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
      }[char]));
      const attr = esc;
      const isExternal = (url) => /^https?:\/\//i.test(String(url || ''));
      const linkAttrs = (url) => {
        const safe = String(url || '#');
        return `href="${attr(safe)}"${isExternal(safe) ? ' target="_blank" rel="noopener noreferrer"' : ''}`;
      };
      const list = (arr) => Array.isArray(arr) ? arr : [];
      const imageOrPlaceholder = (image, alt, label, className = '') => {
        if (image) return `<img src="${attr(image)}" alt="${attr(alt || label || '')}" loading="lazy">`;
        return `<span>${esc(label || 'OTSKY')}</span>`;
      };

      const setMeta = (selector, value) => {
        let el = document.querySelector(selector);
        if (!el) return;
        el.setAttribute('content', value || '');
      };

      function cmsConfig() {
        return window.OTSKY_CMS_CONFIG || {};
      }

      function appendQuery(url, params) {
        const query = new URLSearchParams(params);
        return `${url}${String(url).includes('?') ? '&' : '?'}${query.toString()}`;
      }

      function jsonpRequest(apiUrl, params = {}) {
        return new Promise((resolve, reject) => {
          const callbackName = `otskyCms_${Date.now()}_${Math.random().toString(36).slice(2)}`;
          const timeoutMs = Number(cmsConfig().gsheetLoadTimeoutMs || 12000);
          const script = document.createElement('script');
          const timer = window.setTimeout(() => {
            cleanup();
            reject(new Error('Request Google Sheet timeout.'));
          }, timeoutMs);

          function cleanup() {
            window.clearTimeout(timer);
            try { delete window[callbackName]; } catch (error) { window[callbackName] = undefined; }
            script.remove();
          }

          window[callbackName] = (payload) => {
            cleanup();
            if (payload && payload.ok === false) {
              reject(new Error(payload.error || 'Google Sheet mengembalikan error.'));
              return;
            }
            resolve(payload);
          };

          script.onerror = () => {
            cleanup();
            reject(new Error('Tidak bisa memuat endpoint Google Sheet.'));
          };
          script.src = appendQuery(apiUrl, { action: 'get', callback: callbackName, _: Date.now(), ...params });
          document.head.appendChild(script);
        });
      }

      function extractCmsContent(payload) {
        if (!payload) throw new Error('Response Google Sheet kosong.');
        if (payload.ok === false) throw new Error(payload.error || 'Response Google Sheet gagal.');
        return payload.content || payload.data || payload;
      }

      async function loadFromGsheet(apiUrl) {
        const payload = await jsonpRequest(apiUrl, { action: 'get' });
        return extractCmsContent(payload);
      }

      async function loadContent() {
        const params = new URLSearchParams(window.location.search);
        if (params.get('preview') === '1') {
          try {
            const preview = localStorage.getItem('otskyContentPreview');
            if (preview) return JSON.parse(preview);
          } catch (error) { console.warn('Preview content tidak valid', error); }
        }

        const apiUrl = String(cmsConfig().apiUrl || '').trim();
        if (apiUrl) {
          try {
            return await loadFromGsheet(apiUrl);
          } catch (error) {
            console.warn('Konten Google Sheet gagal dimuat, fallback ke content.json.', error);
          }
        }

        try {
          const fallbackUrl = cmsConfig().fallbackContentUrl || 'content.json';
          const response = await fetch(`${fallbackUrl}?v=${Date.now()}`, { cache: 'no-store' });
          if (response.ok) return await response.json();
        } catch (error) { console.warn('Memakai konten default karena content.json tidak bisa dimuat.', error); }
        return DEFAULT_CONTENT;
      }

      function renderButton(button, variant) {
        if (!button || !button.label) return '';
        return `<a class="btn ${variant}" ${linkAttrs(button.url)}>${esc(button.label)} <span aria-hidden="true">→</span></a>`;
      }

      function renderHeader(data) {
        const navItems = list(data.navigation).map((item) => `<a ${linkAttrs(item.url)}>${esc(item.label)}</a>`).join('');
        return `
          <div class="announcement"><div class="container">${esc(data.brand?.announcement || '')}</div></div>
          <header class="site-header">
            <div class="container nav">
              <a class="brand" href="#top" aria-label="${attr(data.brand?.name || 'OTSKY')} home">
                <span class="brand-mark">${esc((data.brand?.logoText || 'OS').slice(0, 2))}</span>
                <span>${esc(data.brand?.name || 'OTSKY')}<small>${esc(data.brand?.tagline || '')}</small></span>
              </a>
              <nav class="nav-links" data-nav-links aria-label="Navigasi utama">${navItems}</nav>
              <button class="menu-toggle" type="button" data-menu-toggle aria-label="Buka menu" aria-expanded="false"><span></span><span></span></button>
            </div>
          </header>`;
      }

      function renderHero(data) {
        const hero = data.hero || {};
        const badges = list(hero.badges).map((badge) => `<span class="pill">${esc(badge)}</span>`).join('');
        const stats = list(hero.stats).map((item) => `
          <div class="stat-card"><strong>${esc(item.number)}</strong><span>${esc(item.label)}</span></div>
        `).join('');
        return `
          <section class="hero" id="top">
            <div class="container hero-grid">
              <div>
                <span class="eyebrow">${esc(hero.eyebrow)}</span>
                <h1>${esc(hero.title)}</h1>
                <p>${esc(hero.description)}</p>
                <div class="hero-actions">
                  ${renderButton(hero.primaryButton, 'btn-primary')}
                  ${renderButton(hero.secondaryButton, 'btn-secondary')}
                </div>
                <div class="hero-badges">${badges}</div>
                <div class="stats">${stats}</div>
              </div>
              <div class="hero-visual">
                <div class="hero-card">${hero.image ? imageOrPlaceholder(hero.image, hero.imageAlt, data.brand?.name) : `<div class="placeholder">${imageOrPlaceholder('', hero.imageAlt, data.brand?.name || 'OTSKY')}</div>`}</div>
                <div class="floating-note"><strong>${esc(data.brand?.established || '')}</strong><span>${esc(data.brand?.announcement || '')}</span></div>
              </div>
            </div>
          </section>`;
      }

      function renderTrust(data) {
        const cards = list(data.trust).map((item) => `
          <article class="trust-card"><strong>${esc(item.title)}</strong><p>${esc(item.description)}</p></article>
        `).join('');
        return `<section class="section" aria-label="Trust"><div class="container trust-grid">${cards}</div></section>`;
      }

      function renderCategories(data) {
        const section = data.categories || {};
        const items = list(section.items).map((item) => `
          <a class="category-card" ${linkAttrs(item.url)}>
            <div class="category-copy">
              <div><h3>${esc(item.title)}</h3><p>${esc(item.description)}</p></div>
              <span class="text-link">Lihat koleksi <span aria-hidden="true">→</span></span>
            </div>
            <div class="category-art">${imageOrPlaceholder(item.image, item.title, item.icon || item.title)}</div>
          </a>`).join('');
        return `
          <section class="section" id="koleksi">
            <div class="container">
              <div class="section-heading"><div><span class="eyebrow">${esc(section.eyebrow)}</span><h2>${esc(section.title)}</h2></div><p>${esc(section.description)}</p></div>
              <div class="category-grid">${items}</div>
            </div>
          </section>`;
      }

      function renderProducts(data) {
        const section = data.products || {};
        const items = list(section.items).map((item) => `
          <article class="product-card">
            <a class="product-media" ${linkAttrs(item.url)}>${imageOrPlaceholder(item.image, item.name, item.category || item.name)}</a>
            <div class="product-copy">
              <span class="badge">${esc(item.badge)}</span>
              <h3>${esc(item.name)}</h3>
              <p>${esc(item.description)}</p>
              <div class="product-meta"><div><div class="price">${esc(item.price)}</div><div class="mini-category">${esc(item.category)}</div></div><a class="text-link" ${linkAttrs(item.url)}>Beli</a></div>
            </div>
          </article>`).join('');
        return `
          <section class="section" id="produk">
            <div class="container">
              <div class="section-heading"><div><span class="eyebrow">${esc(section.eyebrow)}</span><h2>${esc(section.title)}</h2></div><p>${esc(section.description)}</p></div>
              <div class="product-grid">${items}</div>
              <div style="margin-top: 26px;">${renderButton(section.cta, 'btn-secondary')}</div>
            </div>
          </section>`;
      }

      function renderPromos(data) {
        const section = data.promos || {};
        const items = list(section.items).map((item) => `
          <a class="promo-card" ${linkAttrs(item.url)}>
            <span class="promo-label">${esc(item.label)}</span><h3>${esc(item.title)}</h3><p>${esc(item.description)}</p>
          </a>`).join('');
        return `
          <section class="section promo-section" id="promo">
            <div class="container">
              <div class="section-heading"><div><span class="eyebrow">${esc(section.eyebrow)}</span><h2>${esc(section.title)}</h2></div><p>${esc(section.description)}</p></div>
              <div class="promo-grid">${items}</div>
            </div>
          </section>`;
      }

      function renderStory(data) {
        const section = data.story || {};
        const paragraphs = list(section.paragraphs).map((p) => `<p>${esc(p)}</p>`).join('');
        const highlights = list(section.highlights).map((item) => `<li>${esc(item)}</li>`).join('');
        return `
          <section class="section" id="tentang">
            <div class="container story-grid">
              <div class="story-media">${imageOrPlaceholder(section.image, section.imageAlt, data.brand?.name || 'OTSKY')}</div>
              <div class="story-copy"><span class="eyebrow">${esc(section.eyebrow)}</span><h2>${esc(section.title)}</h2>${paragraphs}<ul class="highlight-list">${highlights}</ul></div>
            </div>
          </section>`;
      }

      function renderLookbook(data) {
        const section = data.lookbook || {};
        const items = list(section.items).map((item) => `
          <article class="look-card"><div class="look-media">${imageOrPlaceholder(item.image, item.title, item.title)}</div><div class="look-copy"><h3>${esc(item.title)}</h3><p>${esc(item.description)}</p></div></article>
        `).join('');
        return `
          <section class="section">
            <div class="container">
              <div class="section-heading"><div><span class="eyebrow">${esc(section.eyebrow)}</span><h2>${esc(section.title)}</h2></div><p>${esc(section.description)}</p></div>
              <div class="look-grid">${items}</div>
            </div>
          </section>`;
      }

      function renderChannels(data) {
        const section = data.channels || {};
        const items = list(section.items).map((item) => `
          <a class="channel-card" ${linkAttrs(item.url)}><strong>${esc(item.name)} <span aria-hidden="true">↗</span></strong><span>${esc(item.description)}</span></a>
        `).join('');
        return `
          <section class="section channels" id="official-store">
            <div class="container">
              <div class="section-heading"><div><span class="eyebrow">${esc(section.eyebrow)}</span><h2>${esc(section.title)}</h2></div><p>${esc(section.description)}</p></div>
              <div class="channel-grid">${items}</div>
            </div>
          </section>`;
      }

      function renderFaq(data) {
        const section = data.faq || {};
        const items = list(section.items).map((item, index) => `
          <details ${index === 0 ? 'open' : ''}><summary>${esc(item.question)}</summary><p>${esc(item.answer)}</p></details>
        `).join('');
        return `
          <section class="section" id="faq">
            <div class="container faq-grid">
              <div><span class="eyebrow">${esc(section.eyebrow)}</span><h2 style="margin: 14px 0 12px; font-size: clamp(32px,4vw,54px); line-height:.98; letter-spacing:-.055em;">${esc(section.title)}</h2><p style="color: var(--muted);">${esc(section.description)}</p></div>
              <div class="faq-list">${items}</div>
            </div>
          </section>`;
      }

      function renderFooter(data) {
        const footer = data.footer || {};
        const links = list(footer.links).map((item) => `<a ${linkAttrs(item.url)}>${esc(item.label)}</a>`).join('');
        return `
          <footer class="site-footer">
            <div class="container">
              <div class="footer-grid">
                <div><a class="brand" href="#top"><span class="brand-mark">${esc((data.brand?.logoText || 'OS').slice(0, 2))}</span><span>${esc(data.brand?.name || 'OTSKY')}<small>${esc(data.brand?.tagline || '')}</small></span></a><p>${esc(footer.description)}</p></div>
                <div class="footer-links">${links}</div>
              </div>
              <div class="copyright">${esc(footer.copyright)}</div>
            </div>
          </footer>
          <a class="sticky-cs" ${linkAttrs(data.brand?.whatsappUrl)}>Chat CS <span aria-hidden="true">→</span></a>`;
      }

      function updateHead(data) {
        const meta = data.meta || {};
        document.title = meta.title || data.brand?.name || 'OTSKY';
        setMeta('meta[name="description"]', meta.description);
        setMeta('meta[name="keywords"]', meta.keywords);
        setMeta('meta[property="og:title"]', meta.title);
        setMeta('meta[property="og:description"]', meta.description);
        setMeta('meta[property="og:image"]', meta.ogImage);
        const existing = document.getElementById('schema-org');
        if (existing) existing.remove();
        const schema = document.createElement('script');
        schema.type = 'application/ld+json';
        schema.id = 'schema-org';
        schema.textContent = JSON.stringify({
          '@context': 'https://schema.org', '@type': 'ClothingStore', name: data.brand?.name || 'OTSKY',
          description: meta.description || '', url: window.location.origin + window.location.pathname,
          sameAs: list(data.channels?.items).map((item) => item.url).filter((url) => /^https?:\/\//i.test(url || ''))
        });
        document.head.appendChild(schema);
      }

      function bindUi() {
        const toggle = document.querySelector('[data-menu-toggle]');
        const links = document.querySelector('[data-nav-links]');
        if (toggle && links) {
          toggle.addEventListener('click', () => {
            const open = links.classList.toggle('is-open');
            toggle.setAttribute('aria-expanded', String(open));
          });
          links.addEventListener('click', () => {
            links.classList.remove('is-open');
            toggle.setAttribute('aria-expanded', 'false');
          });
        }
      }

      function render(data) {
        updateHead(data);
        app.className = '';
        app.innerHTML = `
          ${renderHeader(data)}
          <main id="main">
            ${renderHero(data)}
            ${renderTrust(data)}
            ${renderCategories(data)}
            ${renderProducts(data)}
            ${renderPromos(data)}
            ${renderStory(data)}
            ${renderLookbook(data)}
            ${renderChannels(data)}
            ${renderFaq(data)}
          </main>
          ${renderFooter(data)}`;
        bindUi();
      }

      loadContent().then(render).catch((error) => {
        console.error(error);
        app.className = 'loading';
        app.textContent = 'Konten gagal dimuat. Cek config.js, Google Sheet endpoint, atau content.json.';
      });
    })();
  </script>
